name: app_kids
description: App Kids - check-in/checkout e avisos para pais (Sistema Igreja).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP e API
  http: ^1.2.0
  # Navegação
  go_router: ^13.0.0
  # Estado (escolha um; provider é mais simples para começar)
  provider: ^6.1.1
  # QR Code
  mobile_scanner: ^6.0.2
  # Armazenamento local (token)
  flutter_secure_storage: ^9.0.0
  # Push (Firebase)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Utilitários
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
