name: app_kids
description: App Kids - check-in/checkout e avisos para pais (VerboPlus).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP e API
  http: ^1.2.0
  # Navegação
  go_router: ^13.0.0
  # Estado
  provider: ^6.1.1
  # Armazenamento seguro de tokens (keychain iOS / keystore Android)
  flutter_secure_storage: ^9.2.2
  # Push notifications
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  # Utilitários
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/kingdom-logo-white.png
