server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome podem ser cacheados agressivamente
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — qualquer rota desconhecida volta para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
