name: Admin (React) CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Apps/Admin/**'
      - '.github/workflows/admin.yml'
  pull_request:
    paths:
      - 'Apps/Admin/**'
      - '.github/workflows/admin.yml'

defaults:
  run:
    working-directory: Apps/Admin

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Testes (Vitest) — bloqueiam o deploy
        run: pnpm run test

      - name: Build (valida o bundle antes do deploy)
        run: pnpm run build

      # Deploy: o Coolify builda a imagem (Apps/Admin/Dockerfile → nginx) ao receber o webhook.
      # Mantenha o auto-deploy-on-push DESLIGADO no Coolify para que os testes acima sejam o gate real.
      - name: Disparar deploy no Coolify
        if: github.event_name == 'push'
        run: |
          curl -fsSL -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_ADMIN_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
