name: Admin (React) CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Apps/Admin/**'
      - '.github/workflows/admin.yml'
  pull_request:
    paths:
      - 'Apps/Admin/**'
      - '.github/workflows/admin.yml'

defaults:
  run:
    working-directory: Apps/Admin

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Testes (Vitest) — bloqueiam o deploy
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Deploy para Azure Static Web App
        if: github.event_name == 'push'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'Apps/Admin/dist'
          api_location: ''
          output_location: ''
          skip_app_build: true
