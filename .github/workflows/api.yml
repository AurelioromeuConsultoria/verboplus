name: API (.NET) CI

on:
  push:
    branches: [main]
    paths:
      - 'Apps/API/**'
      - '.github/workflows/api.yml'
  pull_request:
    paths:
      - 'Apps/API/**'
      - '.github/workflows/api.yml'

defaults:
  run:
    working-directory: Apps/API

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/SistemaIgreja.API/SistemaIgreja.API.csproj

      - name: Build (valida antes do deploy)
        run: dotnet build src/SistemaIgreja.API/SistemaIgreja.API.csproj -c Release --no-restore

      # Dispara o deploy no Coolify da API E do Worker (ambos vivem em Apps/API).
      # Coolify aceita UUIDs separados por vírgula numa única chamada.
      - name: Deploy no Coolify (API + Worker)
        if: github.event_name == 'push'
        run: |
          curl -fsSL -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_API_UUID }},${{ secrets.COOLIFY_WORKER_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
